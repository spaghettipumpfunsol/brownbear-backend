<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brown Bear</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #000000;
    overflow: hidden;
  }

  .page {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000000;
    position: relative;
  }

  .bear-img {
    width: 340px;
    max-width: 75vw;
    opacity: 0;
    animation: fadeIn 1.2s ease 0.3s forwards;
  }

  .brand {
    margin-top: 28px;
    font-family: 'Montserrat', sans-serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 14px;
    color: #ffffff;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 1s ease 0.8s forwards;
  }

  .enter-btn {
    margin-top: 52px;
    padding: 14px 52px;
    border: 1.5px solid #ffffff;
    border-radius: 40px;
    background: transparent;
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 5px;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    opacity: 0;
    animation: fadeIn 1s ease 1.2s forwards;
    transition: background 0.25s, color 0.25s;
  }

  .enter-btn:hover {
    background: #ffffff;
    color: #000000;
  }

  .footer {
    position: absolute;
    bottom: 36px;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 1s ease 1.6s forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .bear-img { width: 260px; }
    .brand { font-size: 17px; letter-spacing: 10px; }
    .enter-btn { padding: 12px 40px; font-size: 11px; }
  }
</style>
</head>
<body>
<div class="page">
  <img class="bear-img" src="bear.png" alt="Brown Bear">
  <div class="brand">Brown Bear</div>
  <a class="enter-btn" href="app.html">Enter</a>
  <div class="footer">Spaghetti Labs &nbsp;·&nbsp; 2026</div>
</div>
</body>
</html>
