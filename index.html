<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brown Bear</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; }
  .page {
    width: 100%; min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000; padding: 40px 20px;
  }
  .bear-img {
    width: 520px; max-width: 90vw; display: block;
    opacity: 0; animation: fi 1.4s ease 0.2s forwards;
  }
  .enter-btn {
    margin-top: 48px; padding: 14px 56px;
    border: 1.5px solid rgba(255,255,255,0.7);
    border-radius: 40px; background: transparent;
    color: #fff; font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 400;
    letter-spacing: 6px; text-transform: uppercase;
    cursor: pointer; text-decoration: none; display: inline-block;
    opacity: 0; animation: fi 1s ease 1s forwards;
    transition: background 0.25s, color 0.25s;
  }
  .enter-btn:hover { background: #fff; color: #000; }
  .footer {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-family: 'Montserrat', sans-serif; font-size: 9px;
    font-weight: 300; letter-spacing: 5px;
    color: rgba(255,255,255,0.25); text-transform: uppercase;
    white-space: nowrap; opacity: 0; animation: fi2 1s ease 1.4s forwards;
  }
  @keyframes fi {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fi2 {
    from { opacity: 0; } to { opacity: 1; }
  }
  @media (max-width: 480px) {
    .bear-img { width: 320px; }
    .enter-btn { padding: 12px 40px; font-size: 11px; }
  }
</style>
</head>
<body>
<div class="page">
  <img class="bear-img" src="bear.png" alt="Brown Bear">
  <a class="enter-btn" href="app.html">Enter</a>
</div>
<div class="footer">Spaghetti Labs &middot; 2026</div>
</body>
</html>
